<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }
        </script><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smiski Animation</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.22.5/Babel.min.js"></script>
  <style>
    /* Custom styles replacing Tailwind CSS */
    .container {
      width: 100%;
      max-width: 600px;
      height: 200px;
      border: 2px solid #4a5568;
      position: relative;
      overflow: hidden;
      background-color: #f7fafc;
      margin: 32px auto 0 auto; /* Equivalent to mt-8 */
      border-radius: 8px;
    }
    .smiski {
      width: 50px;
      height: 50px;
      position: absolute;
      bottom: 10px;
      background-size: cover;
      transition: transform 0.1s ease-out;
    }
    .smiski-running-right {
      transform: scaleX(1);
    }
    .smiski-running-left {
      transform: scaleX(-1);
    }
    .speech-bubble {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      background-color: white;
      border: 1px solid #4a5568;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 12px;
      white-space: nowrap;
      display: none;
    }
    .smiski:hover .speech-bubble {
      display: block;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react,typescript">
    interface SmiskiProps {
      id: number;
      position: number;
      direction: 'left' | 'right';
      name: string;
    }

    const Smiski: React.FC<SmiskiProps> = ({ id, position, direction, name }) => {
      return (
        <div
          className={`smiski ${direction === 'right' ? 'smiski-running-right' : 'smiski-running-left'}`}
          style={{
            left: `${position}px`,
            backgroundImage: `url('https://images.squarespace-cdn.com/content/v1/61e7db1ae0a00c2555c705d2/1646175921585-6O9B5E0H0ZJ2ZJ2ZJ2ZJ2/Smiski_Series1.png')`
          }}
        >
          <div className="speech-bubble">{name} says: Hi!</div>
        </div>
      );
    };

    const App: React.FC = () => {
      const [smiskis, setSmiskis] = React.useState<SmiskiProps[]>([
        { id: 1, position: 0, direction: 'right', name: 'Smiski 1' },
        { id: 2, position: 100, direction: 'left', name: 'Smiski 2' }
      ]);

      React.useEffect(() => {
        const interval = setInterval(() => {
          setSmiskis((prevSmiskis) =>
            prevSmiskis.map((smiski) => {
              let newPosition = smiski.position + (smiski.direction === 'right' ? 5 : -5);
              let newDirection = smiski.direction;

              if (newPosition >= 550) {
                newPosition = 550;
                newDirection = 'left';
              } else if (newPosition <= 0) {
                newPosition = 0;
                newDirection = 'right';
              }

              return { ...smiski, position: newPosition, direction: newDirection };
            })
          );
        }, 100);

        return () => clearInterval(interval);
      }, []);

      return (
        <div className="container">
          {smiskis.map((smiski) => (
            <Smiski key={smiski.id} {...smiski} />
          ))}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
